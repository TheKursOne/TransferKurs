<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SoliCAN</title>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#050505;
color:white;
}

h1{
text-align:center;
color:#00ffd0;
text-shadow:0 0 10px #00ffd0;
}

.wrapper{
max-width:1200px;
margin:auto;
padding:20px;
}

/* DESKTOP */

.layout{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.panel{
background:#111;
padding:20px;
border-radius:12px;
box-shadow:0 0 10px #00ffd033;
}

video{
width:100%;
border-radius:10px;
}

/* camera box */

.cameraBox{
position:relative;
overflow:hidden;
border-radius:10px;
}

.scanline{
position:absolute;
left:0;
width:100%;
height:3px;
background:#00ffd0;
box-shadow:0 0 10px #00ffd0;
animation:scanMove 2s linear infinite;
}

@keyframes scanMove{
0%{top:0%}
100%{top:100%}
}

button{
padding:12px;
background:#00ffd0;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
margin-bottom:10px;
}

#preview{
width:100%;
margin-top:10px;
border-radius:10px;
}

#hasil{
margin-top:15px;
padding:15px;
background:#000;
border-radius:8px;
word-break:break-all;
}

a{
color:#00ffd0;
}

/* MOBILE */

@media (max-width:700px){

.layout{
grid-template-columns:1fr;
}

body{
font-size:16px;
}

button{
width:100%;
}

}

</style>
</head>

<body>

<div class="wrapper">

<h1>SoliCAN</h1>

<div class="layout">

<div class="panel">

<h3>Scan Kamera</h3>

<button onclick="startCamera()">Aktifkan Kamera</button>

<div class="cameraBox">

<video id="video"></video>
<div class="scanline"></div>

</div>

</div>

<div class="panel">

<h3>Upload Barcode</h3>

<input type="file" id="fileInput" accept="image/*">

<img id="preview">

<div id="hasil">Belum ada hasil</div>

</div>

</div>

</div>

<audio id="beep">
<source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<script>

const codeReader = new ZXing.BrowserMultiFormatReader();
const video = document.getElementById("video");
const hasil = document.getElementById("hasil");
const beep = document.getElementById("beep");

function tampilkan(text){

beep.play();

hasil.innerHTML =
"Link ditemukan:<br><a href='"+text+"' target='_blank'>"+text+"</a>";

}

/* kamera */

function startCamera(){

codeReader.decodeFromVideoDevice(null, video, (result, err)=>{

if(result){
tampilkan(result.text);
}

});

}

/* upload */

document.getElementById("fileInput").addEventListener("change", function(e){

const file = e.target.files[0];
if(!file) return;

const preview = document.getElementById("preview");
preview.src = URL.createObjectURL(file);

const reader = new FileReader();

reader.onload = function(){

codeReader.decodeFromImage(undefined, reader.result)
.then(result => {

tampilkan(result.text);

})
.catch(() => {

hasil.innerText="Barcode tidak terbaca";

});

};

reader.readAsDataURL(file);

});

</script>

</body>
</html>
