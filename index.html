<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SoliCAN</title>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#050505;
color:white;
}

h1{
text-align:center;
color:#00ffd0;
}

.wrapper{
max-width:1200px;
margin:auto;
padding:15px;
}

/* DEFAULT = HP */

.layout{
display:flex;
flex-direction:column;
gap:20px;
}

.panel{
background:#111;
padding:20px;
border-radius:12px;
}

video{
width:100%;
border-radius:10px;
}

button{
padding:12px;
background:#00ffd0;
border:none;
border-radius:8px;
width:100%;
margin-bottom:10px;
}

#preview{
width:100%;
margin-top:10px;
border-radius:10px;
}

#hasil{
margin-top:15px;
padding:15px;
background:#000;
border-radius:8px;
word-break:break-all;
}

a{
color:#00ffd0;
}

/* DESKTOP */

@media (min-width:900px){

.layout{
flex-direction:row;
}

.panel{
flex:1;
}

button{
width:auto;
}

}

</style>
</head>

<body>

<div class="wrapper">

<h1>SoliCAN</h1>

<div class="layout">

<div class="panel">

<h3>Scan Kamera</h3>

<button onclick="startCamera()">Aktifkan Kamera</button>

<video id="video"></video>

</div>

<div class="panel">

<h3>Upload Barcode</h3>

<input type="file" id="fileInput" accept="image/*">

<img id="preview">

<div id="hasil">Belum ada hasil</div>

</div>

</div>

</div>

<script>

const codeReader = new ZXing.BrowserMultiFormatReader();
const video = document.getElementById("video");
const hasil = document.getElementById("hasil");

function tampilkan(text){

hasil.innerHTML =
"Link ditemukan:<br><a href='"+text+"' target='_blank'>"+text+"</a>";

}

function startCamera(){

codeReader.decodeFromVideoDevice(null, video, (result, err)=>{

if(result){
tampilkan(result.text);
}

});

}

document.getElementById("fileInput").addEventListener("change", function(e){

const file = e.target.files[0];
if(!file) return;

const preview = document.getElementById("preview");
preview.src = URL.createObjectURL(file);

const reader = new FileReader();

reader.onload = function(){

codeReader.decodeFromImage(undefined, reader.result)
.then(result => {

tampilkan(result.text);

})
.catch(() => {

hasil.innerText="Barcode tidak terbaca";

});

};

reader.readAsDataURL(file);

});

</script>

</body>
</html>
