<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SoliCAN - Soli Scan</title>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>
body{
font-family:Arial;
background:#0f0f0f;
color:white;
text-align:center;
padding:20px;
}

h1{
color:#00ff88;
}

video{
width:320px;
border-radius:10px;
margin-top:10px;
}

#preview{
max-width:320px;
margin-top:10px;
border-radius:10px;
}

#hasil{
margin-top:20px;
background:#1e1e1e;
padding:15px;
border-radius:10px;
word-break:break-all;
}

button{
padding:10px 15px;
margin:10px;
border:none;
border-radius:6px;
background:#00ff88;
cursor:pointer;
}

a{
color:#00ffcc;
}
</style>
</head>

<body>

<h1>SoliCAN</h1>
<p>Scan QR / Barcode dari kamera atau upload gambar</p>

<button onclick="startCamera()">Scan Kamera</button>

<br>

<video id="video"></video>

<br><br>

<input type="file" id="fileInput" accept="image/*">

<br>

<img id="preview">

<div id="hasil">Belum ada hasil</div>

<script>

const codeReader = new ZXing.BrowserMultiFormatReader();
const video = document.getElementById("video");
const hasil = document.getElementById("hasil");

function tampilkan(text){

hasil.innerHTML =
"Link ditemukan:<br><a href='"+text+"' target='_blank'>"+text+"</a>";

}

/* SCAN KAMERA */

function startCamera(){

codeReader.decodeFromVideoDevice(null, video, (result, err) => {

if(result){
tampilkan(result.text);
}

});

}

/* SCAN FILE */

document.getElementById("fileInput").addEventListener("change", function(e){

const file = e.target.files[0];
if(!file) return;

const preview = document.getElementById("preview");
preview.src = URL.createObjectURL(file);

const reader = new FileReader();

reader.onload = function(){

codeReader.decodeFromImage(undefined, reader.result)
.then(result => {

tampilkan(result.text);

})
.catch(() => {

hasil.innerText = "Barcode tidak terbaca";

});

};

reader.readAsDataURL(file);

});

</script>

</body>
</html>
